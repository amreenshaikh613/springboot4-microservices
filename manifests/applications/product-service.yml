apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: 741458575095.dkr.ecr.us-west-2.amazonaws.com/product-service
          env:
            - name: SPRING_MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  key: SPRING_MONGODB_URI
                  name: product-service-config
            - name: SPRING_MONGODB_USERNAME
              valueFrom:
                configMapKeyRef:
                  key: SPRING_MONGODB_USERNAME
                  name: product-service-config
            - name: SPRING_MONGODB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  key: SPRING_MONGODB_PASSWORD
                  name: product-service-config
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  key: LOKI_URL
                  name: common-config
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  key: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
                  name: common-config
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
data:
  SPRING_MONGODB_URI: "mongodb://root:password@mongodb:27017/product_service?authSource=admin"
  SPRING_MONGODB_HOST: mongodb
  SPRING_MONGODB_PORT: "27017"
  SPRING_MONGODB_DATABASE: product_service
  SPRING_MONGODB_USERNAME: root
  SPRING_MONGODB_PASSWORD: password
  SPRING_MONGODB_AUTHENTICATION_DATABASE: admin