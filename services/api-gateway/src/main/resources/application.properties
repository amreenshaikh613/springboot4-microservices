spring.application.name=api-gateway
server.port=8080
server.address=0.0.0.0
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/springboot4-microservices
springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.urls[0].name=Product Service
springdoc.swagger-ui.urls[0].url=https://product-service-859367510029.us-central1.run.app/v3/api-docs
springdoc.swagger-ui.urls[1].name=Order Service
springdoc.swagger-ui.urls[1].url=https://order-service-859367510029.us-central1.run.app/api-docs
springdoc.swagger-ui.urls[2].name=Inventory Service
springdoc.swagger-ui.urls[2].url=https://inventory-service-859367510029.us-central1.run.appv3/api-docs

management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.export.stackdriver.enabled=true
management.health.enabled=true
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.stackdriver.metrics.export.project-id=springboot4-microservices


#Resilinece4j Properties
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5

resilience4j.timelimiter.configs.default.timeout-duration=3s

#Resilience4J Retry Properties
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=2s
#
product.service.url=https://product-service-859367510029.us-central1.run.app
order.service.url=https://order-service-859367510029.us-central1.run.app
inventory.service.url=https://inventory-service-859367510029.us-central1.run.app

