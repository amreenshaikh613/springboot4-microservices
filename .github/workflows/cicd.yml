name: ci-cd-pipeline

on:
  push:
    branches: ["main", "eks"]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 741458575095.dkr.ecr.us-west-2.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # -------------------------
      # SET IMAGE TAG
      # -------------------------
      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # -------------------------
      # JAVA SETUP
      # -------------------------
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -------------------------
      # AWS AUTH
      # -------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # EKS ACCESS
      # -------------------------
      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name springboot-microservices \
            --region $AWS_REGION

      # -------------------------
      # ECR LOGIN
      # -------------------------
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      # -------------------------
      # BUILD SERVICES
      # -------------------------
      - name: Build services
        run: |
          for svc in order-service product-service inventory-service notification-service api-gateway
          do
            cd services/$svc
            mvn clean package -DskipTests
            cd -
          done

      # -------------------------
      # BUILD & PUSH IMAGES
      # -------------------------
      - name: Build & Push Images
        run: |
          for svc in order-service product-service inventory-service notification-service api-gateway
          do
            docker build -t $ECR_REGISTRY/$svc:$IMAGE_TAG ./services/$svc
            docker push $ECR_REGISTRY/$svc:$IMAGE_TAG
          done

      # -------------------------
      # INSTALL HELMFILE
      # -------------------------
      - name: Install Helmfile (safe)
        run: |
          set -e

          VERSION=$(curl -s https://api.github.com/repos/helmfile/helmfile/releases/latest | grep tag_name | cut -d '"' -f 4)

          curl -L \
            https://github.com/helmfile/helmfile/releases/download/${VERSION}/helmfile_linux_amd64 \
            -o helmfile

          chmod +x helmfile
          sudo mv helmfile /usr/local/bin/helmfile

          helmfile --version

      # -------------------------
      # DEPLOY
      # -------------------------
      - name: Deploy with Helmfile
        run: |
          helmfile apply

      # -------------------------
      # VERIFY DEPLOYMENT
      # -------------------------
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/order-service
          kubectl rollout status deployment/product-service
          kubectl rollout status deployment/inventory-service
          kubectl rollout status deployment/notification-service
          kubectl rollout status deployment/api-gateway
